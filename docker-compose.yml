version: '3.9'

services:
  backend:
    build: ./backend
    container_name: craftarr-backend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATA_PATH=/data
      # Chemin hôte du dossier data (pour les bind mounts des containers MC)
      - HOST_DATA_PATH=${HOST_DATA_PATH:-/root/Projet/craftarr/data}
      # Optionnel : surcharger ici ou dans un .env
      # - ADMIN_USERNAME=admin
      # - ADMIN_PASSWORD=monmotdepasse
      # - CURSEFORGE_API_KEY=
      # - MODRINTH_API_KEY=
      # - UPDATE_CHECK_INTERVAL_HOURS=6
      # - UI_PORT=8080
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./craftarr/data:/data
    networks:
      - craftarr-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontend:
    build: ./frontend
    container_name: craftarr-frontend
    restart: unless-stopped
    ports:
      - "${UI_PORT:-8080}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - craftarr-net

networks:
  craftarr-net:
    name: craftarr
    driver: bridge
